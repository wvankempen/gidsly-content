name: Purge jsDelivr cache

# Auto-purge jsDelivr's cache for any markdown file in this repo
# whenever main is updated, so legal copy edits propagate to
# www.gidsly.com and app.gidsly.com within ~30 seconds instead of
# waiting up to 12 hours for jsDelivr's TTL to expire on its own.
#
# How it works:
#   1. On push to main that touches any *.md file, run this workflow.
#   2. Find every markdown file currently in the repo.
#   3. Hit https://purge.jsdelivr.net/gh/<owner>/<repo>/<file> for each.
#      jsDelivr drops its cached copy and re-fetches from GitHub on the
#      next request from any reader.
#
# Why purge ALL .md files on any markdown change (not just the ones
# changed in this commit): the repo is tiny (privacy.md, terms.md, plus
# README.md which nobody fetches). Running 2-3 purge requests is faster
# and simpler than diffing the commit. If the repo grows, switch to a
# changed-files detection step.
#
# Safe to fail: a purge failure (network blip, jsDelivr API hiccup,
# rate limit) is non-fatal — the cache will still expire naturally
# within 12h, so your edit eventually propagates either way.

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Purge each markdown file from jsDelivr
        run: |
          for file in $(find . -name '*.md' -not -path './.git/*' | sed 's|^\./||'); do
            url="https://purge.jsdelivr.net/gh/${{ github.repository }}/${file}"
            echo "Purging: $url"
            response=$(curl -sf "$url" || echo '{"error":"request failed"}')
            echo "Response: $response"
            echo ""
          done
